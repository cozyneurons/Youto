services:
  # ── Database ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: youto-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: youto
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Cache ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: youto-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # ── Backend ───────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: youto-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/youto
      REDIS_URL: redis://redis:6379
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped

  # ── Celery Worker ─────────────────────────────────────────────────────────
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: youto-celery
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/youto
      REDIS_URL: redis://redis:6379
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
    depends_on:
      - redis
      - postgres
    volumes:
      - ./backend:/app
    command: celery -A app.tasks.extract_video.celery_app worker --loglevel=info --concurrency=2
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped

  # ── Celery Beat ───────────────────────────────────────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: youto-celery-beat
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/youto
      REDIS_URL: redis://redis:6379
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - redis
      - postgres
    volumes:
      - ./backend:/app
    command: celery -A app.tasks.extract_video.celery_app beat --loglevel=info
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped

  # ── Frontend (dev) ────────────────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: youto-frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_URL: http://localhost:8000
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
